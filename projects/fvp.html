<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farm Visit Portal (FVP) • Project Overview</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var shouldDark = saved ? saved === 'dark' : prefersDark;
          if (shouldDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="../assets/css/tailwind.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body class="min-h-screen">
    <header class="sticky top-0 z-50 border-b border-gray-200 bg-white/80 backdrop-blur">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
        <a href="index.html" class="font-semibold tracking-tight">Projects</a>
        <div class="flex items-center gap-2">
          <button id="themeToggle" type="button" class="inline-flex items-center justify-center rounded-lg border border-gray-300 bg-white p-2 text-gray-900 hover:bg-gray-50" aria-label="Toggle dark mode">
            <span class="sr-only">Toggle dark mode</span>
            <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2" />
              <path d="M12 20v2" />
              <path d="M4.93 4.93l1.41 1.41" />
              <path d="M17.66 17.66l1.41 1.41" />
              <path d="M2 12h2" />
              <path d="M20 12h2" />
              <path d="M4.93 19.07l1.41-1.41" />
              <path d="M17.66 6.34l1.41-1.41" />
            </svg>
            <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
              <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" />
            </svg>
          </button>
          <a href="../index.html" class="rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm font-medium text-gray-900 hover:bg-gray-50">Home</a>
        </div>
      </div>
    </header>

    <main>
      <section class="mx-auto max-w-6xl px-4 py-10">
        <p class="text-sm text-gray-600"><a class="hover:underline" href="index.html">Projects</a> / FVP</p>
        <div class="mt-2">
          <h1 class="text-3xl font-bold tracking-tight">Farm Visit Portal (FVP)</h1>
          <p class="mt-2 text-gray-600">February 2026</p>
        </div>

        <div class="mt-8 grid gap-4 lg:grid-cols-12">
          <div class="lg:col-span-7">
            <div class="rounded-2xl border border-gray-200 bg-white p-5">
              <div class="text-sm font-semibold">Overview</div>
              <p class="mt-2 text-sm text-gray-600">
                FVP is a permit and scheduling portal for farm visits. This overview showcases the user dashboard,
                permit statuses, and the admin workflow.
              </p>
            </div>

            <div class="mt-4 rounded-2xl border border-gray-200 bg-white p-5">
              <div class="text-sm font-semibold">Photos</div>
              <div class="mt-3 grid gap-3 sm:grid-cols-2">
                <div class="rounded-lg border border-gray-200 bg-gray-50 p-4">
                  <div class="text-xs font-semibold">Dashboard</div>
                  <a class="js-lightbox" href="../assets/images/fvp/Dashboard.png" data-lightbox-caption="Dashboard"><img class="mt-2 h-36 w-full cursor-zoom-in rounded-md object-cover" src="../assets/images/fvp/Dashboard.png" alt="Dashboard" loading="lazy" /></a>
                </div>
                <div class="rounded-lg border border-gray-200 bg-gray-50 p-4">
                  <div class="text-xs font-semibold">Permits</div>
                  <a class="js-lightbox" href="../assets/images/fvp/Permits.png" data-lightbox-caption="Permits"><img class="mt-2 h-36 w-full cursor-zoom-in rounded-md object-cover" src="../assets/images/fvp/Permits.png" alt="Permits" loading="lazy" /></a>
                </div>
                <div class="rounded-lg border border-gray-200 bg-gray-50 p-4">
                  <div class="text-xs font-semibold">Guard</div>
                  <a class="js-lightbox" href="../assets/images/fvp/Guard.png" data-lightbox-caption="Guard"><img class="mt-2 h-36 w-full cursor-zoom-in rounded-md object-cover" src="../assets/images/fvp/Guard.png" alt="Guard" loading="lazy" /></a>
                </div>
                <div class="rounded-lg border border-gray-200 bg-gray-50 p-4">
                  <div class="text-xs font-semibold">Landing</div>
                  <a class="js-lightbox" href="../assets/images/fvp/Landing.png" data-lightbox-caption="Landing"><img class="mt-2 h-36 w-full cursor-zoom-in rounded-md object-cover" src="../assets/images/fvp/Landing.png" alt="Landing" loading="lazy" /></a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="lightboxModal" class="lightbox-modal" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="lightbox-backdrop" data-lightbox-close></div>
      <div class="lightbox-content" role="document">
        <button type="button" class="lightbox-close" aria-label="Close" data-lightbox-close>×</button>
        <img id="lightboxImage" class="lightbox-image" alt="" />
      </div>
    </div>

    <script src="../assets/js/main.js"></script>
  </body>
</html>
